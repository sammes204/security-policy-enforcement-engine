services:
  ai-service:
    build: .
    container_name: security-policy-ai-service
    environment:
      AI_PROVIDER: groq
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
